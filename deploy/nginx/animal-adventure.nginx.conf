server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    root D:/Animal_Adventure/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/images/ {
        alias D:/Animal_Adventure/assets/images/;
    }

    location /assets/music/ {
        alias D:/Animal_Adventure/assets/music/;
    }

    location /assets/ {
        alias D:/Animal_Adventure/dist/assets/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location /ready {
        proxy_pass http://127.0.0.1:8000;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
